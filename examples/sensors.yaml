type: screen
width: 400
height: 280
bar:
  type: hbox
  h: 16
  border_b: true
  children:
    - type: label
      text: "{{title}}"
    - type: spacer
    - type: label
      text: "{{status}}"
      color: mid
body:
  type: vbox
  children:
    - type: fixed
      h: 80
      children:
        - type: label
          x: 8
          y: 4
          text: ROLL
          color: ghost
        - type: label
          x: 8
          y: 18
          bind: sensor.roll
          field_w: 6
          size: 2
          waveform: part
        - type: bar
          x: 8
          y: 48
          w: 180
          h: 4
          bind: sensor.roll
          max: 360
          waveform: part
        - type: label
          x: 200
          y: 4
          text: PITCH
          color: ghost
        - type: label
          x: 200
          y: 18
          bind: sensor.pitch
          field_w: 6
          size: 2
          waveform: part
        - type: bar
          x: 200
          y: 48
          w: 180
          h: 4
          bind: sensor.pitch
          max: 360
          waveform: part
        - type: sep
          x: 0
          y: 64
          w: 400
    - type: fixed
      h: 80
      children:
        - type: label
          x: 8
          y: 4
          text: TEMPERATURE
          color: ghost
        - type: label
          x: 8
          y: 18
          bind: sensor.temp
          field_w: 5
          size: 2
          waveform: fast
        - type: bar
          x: 8
          y: 48
          w: 180
          h: 4
          bind: sensor.temp
          max: 100
          waveform: fast
        - type: label
          x: 200
          y: 4
          text: HUMIDITY
          color: ghost
        - type: label
          x: 200
          y: 18
          bind: sensor.humidity
          field_w: 4
          size: 2
          waveform: fast
        - type: bar
          x: 200
          y: 48
          w: 180
          h: 4
          bind: sensor.humidity
          max: 100
          waveform: fast
        - type: sep
          x: 0
          y: 64
          w: 400
    - type: fixed
      children:
        - type: label
          x: 8
          y: 4
          text: BATTERY
          color: ghost
        - type: label
          x: 8
          y: 18
          bind: battery.pct
          field_w: 3
          size: 2
          waveform: part
        - type: bar
          x: 8
          y: 48
          w: 380
          h: 6
          bind: battery.pct
          max: 100
          fill_color: fg
          waveform: part
        - type: label
          x: 200
          y: 4
          text: VOLTAGE
          color: ghost
        - type: label
          x: 200
          y: 18
          bind: battery.voltage
          field_w: 5
          size: 2
          waveform: fast
nav:
  type: hbox
  h: 16
  border_t: true
  children:
    - type: label
      text: "{{nav_left}}"
      color: mid
    - type: spacer
    - type: label
      text: "{{nav_right}}"
      color: mid
